<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World — Tapi Keren</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00fff0;
    --pink: #ff006e;
    --yellow: #f5e642;
    --dark: #020b18;
    --mid: #0a1628;
  }

  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    transition: transform 0.08s ease;
    box-shadow: 0 0 12px var(--cyan), 0 0 30px var(--cyan);
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, width 0.2s, height 0.2s, border-color 0.2s;
    opacity: 0.6;
  }

  /* Grid scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,240,0.015) 2px, rgba(0,255,240,0.015) 4px);
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 11;
  }

  /* Canvas particles */
  canvas {
    position: fixed; inset: 0;
    z-index: 1;
  }

  /* Main content */
  .stage {
    position: relative;
    z-index: 20;
    text-align: center;
    user-select: none;
  }

  .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--pink);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s forwards;
  }

  .hello {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 14rem);
    line-height: 0.85;
    letter-spacing: 0.03em;
    color: #fff;
    position: relative;
    display: inline-block;
    opacity: 0;
    animation: fadeUp 0.7s 0.5s forwards;
  }

  /* Glitch layers */
  .hello::before,
  .hello::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    opacity: 0.7;
  }
  .hello::before {
    color: var(--pink);
    clip-path: polygon(0 30%, 100% 30%, 100% 55%, 0 55%);
    animation: glitch1 4s infinite;
  }
  .hello::after {
    color: var(--cyan);
    clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    animation: glitch2 4s infinite;
  }

  .world {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 14rem);
    line-height: 0.85;
    letter-spacing: 0.03em;
    color: var(--cyan);
    text-shadow: 0 0 40px rgba(0,255,240,0.5), 0 0 80px rgba(0,255,240,0.2);
    position: relative;
    display: inline-block;
    opacity: 0;
    animation: fadeUp 0.7s 0.8s forwards;
  }
  .world::before, .world::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    opacity: 0.6;
  }
  .world::before {
    color: var(--yellow);
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    animation: glitch3 5s 1s infinite;
  }
  .world::after {
    color: var(--pink);
    clip-path: polygon(0 70%, 100% 70%, 100% 85%, 0 85%);
    animation: glitch1 3.5s 0.5s infinite;
  }

  .sub {
    margin-top: 2rem;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: rgba(0,255,240,0.45);
    opacity: 0;
    animation: fadeUp 0.6s 1.2s forwards;
  }

  /* Click button */
  .btn {
    margin-top: 2.5rem;
    display: inline-block;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    padding: 0.75rem 2rem;
    text-transform: uppercase;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
    opacity: 0;
    animation: fadeUp 0.6s 1.5s forwards;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }
  .btn:hover { color: var(--dark); }
  .btn:hover::before { transform: translateX(0); }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    opacity: 0.35;
    z-index: 20;
  }
  .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  /* Status bar */
  .status {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: rgba(0,255,240,0.3);
    z-index: 20;
    white-space: nowrap;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes glitch1 {
    0%,90%,100% { transform: translate(0); }
    91% { transform: translate(-4px, 1px); }
    93% { transform: translate(4px, -1px); }
    95% { transform: translate(-3px, 2px); }
    97% { transform: translate(2px, -2px); }
  }
  @keyframes glitch2 {
    0%,85%,100% { transform: translate(0); }
    86% { transform: translate(5px, -2px); }
    88% { transform: translate(-5px, 2px); }
    90% { transform: translate(3px, 1px); }
  }
  @keyframes glitch3 {
    0%,80%,100% { transform: translate(0); }
    81% { transform: translate(-6px, 1px); }
    83% { transform: translate(6px, -1px); }
    85% { transform: translate(-2px, 3px); }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="c"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stage">
  <div class="label">// Ini bukan hello world biasa</div>

  <div>
    <span class="hello" data-text="HELLO">HELLO</span>
  </div>
  <div>
    <span class="world" data-text="WORLD">WORLD</span>
  </div>

  <div class="sub">KLIK DI MANA SAJA UNTUK LEDAKAN PARTIKEL</div>
  <div class="btn" id="btn" onclick="burst(mouseX, mouseY, 80)">[ TRIGGER CHAOS ]</div>
</div>

<div class="status" id="status">SYS://ONLINE — KOORDINAT: 0,0 — PARTIKEL: 0</div>

<script>
// ── Canvas particles ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
let mouseX = 0, mouseY = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#00fff0','#ff006e','#f5e642','#ffffff','#7b00ff'];

class Particle {
  constructor(x, y, big = false) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5) * (big ? 14 : 6);
    this.vy = (Math.random()-0.5) * (big ? 14 : 6) - (big ? 3 : 1);
    this.life = 1;
    this.decay = Math.random() * 0.02 + (big ? 0.008 : 0.012);
    this.size = Math.random() * (big ? 6 : 3) + 1;
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.trail = [];
    this.gravity = big ? 0.15 : 0.06;
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 8) this.trail.shift();
    this.vx *= 0.97;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const a = (i / this.trail.length) * this.life * 0.4;
      ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * (i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
    }
    // Core
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// Ambient floating particles
function spawnAmbient() {
  if (particles.length < 120) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const p = new Particle(x, y);
    p.vx = (Math.random()-0.5)*0.5;
    p.vy = -Math.random()*0.8 - 0.2;
    p.decay = 0.004;
    p.size = Math.random()*1.5+0.5;
    p.gravity = -0.01;
    particles.push(p);
  }
}

function burst(x, y, count = 40) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, count > 30));
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  spawnAmbient();
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  document.getElementById('status').textContent =
    `SYS://ONLINE — KOORDINAT: ${Math.floor(mouseX)},${Math.floor(mouseY)} — PARTIKEL: ${particles.length}`;

  requestAnimationFrame(loop);
}
loop();

// Click burst
document.addEventListener('click', e => {
  burst(e.clientX, e.clientY, 50);
});

// Mouse move
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  document.getElementById('cursor').style.left = e.clientX + 'px';
  document.getElementById('cursor').style.top  = e.clientY + 'px';
  setTimeout(() => {
    document.getElementById('cursor-ring').style.left = e.clientX + 'px';
    document.getElementById('cursor-ring').style.top  = e.clientY + 'px';
  }, 60);

  // Subtle parallax on title
  const dx = (e.clientX/W - 0.5) * 20;
  const dy = (e.clientY/H - 0.5) * 10;
  document.querySelector('.stage').style.transform =
    `translate(${dx}px, ${dy}px)`;

  // Spawn trail particles sparingly
  if (Math.random() < 0.15) {
    const p = new Particle(e.clientX, e.clientY);
    p.vx = (Math.random()-0.5)*1;
    p.vy = (Math.random()-0.5)*1;
    p.decay = 0.04;
    p.size = 2;
    p.gravity = 0;
    particles.push(p);
  }
});

// Cursor ring expand on hover clickable
document.querySelectorAll('.btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    document.getElementById('cursor-ring').style.width = '60px';
    document.getElementById('cursor-ring').style.height = '60px';
    document.getElementById('cursor-ring').style.borderColor = 'var(--pink)';
  });
  el.addEventListener('mouseleave', () => {
    document.getElementById('cursor-ring').style.width = '36px';
    document.getElementById('cursor-ring').style.height = '36px';
    document.getElementById('cursor-ring').style.borderColor = 'var(--cyan)';
  });
});

// Keyboard easter egg
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    burst(W/2, H/2, 120);
  }
});
</script>
</body>
</html>
